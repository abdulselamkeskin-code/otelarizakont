<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Otel Arıza Sistemi</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

h2 {
  color: #333;
}

input, button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}

#panel {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

li {
  background: #f9f9f9;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
}

.bekliyor { color: orange; }
.tamamlandı { color: green; }
</style>

</head>
<body>

<div id="login">
  <h2>Admin Giriş</h2>
  <input type="password" id="pass" placeholder="1234">
  <button onclick="login()">Giriş</button>
</div>

<div id="panel" style="display:none;">

  <h2>Otel Arıza Sistemi</h2>

  <input id="oda" placeholder="Oda No">
  <input id="ariza" placeholder="Arıza">
  <button onclick="gonder()">Ekle</button>

  <br><br>

  <select id="filtre" onchange="listeyiGetir()">
    <option value="hepsi">Tümü</option>
    <option value="bekliyor">Bekleyen</option>
    <option value="tamamlandı">Tamamlanan</option>
  </select>

  <ul id="liste"></ul>

</div>

<script>

const SUPABASE_URL = "https://seailllpjdyveevepgio.supabase.co";
const SUPABASE_KEY = "sb_publishable_90Mva-YNxKYrH8mw8xxe5w_BV6E9Uyx";

function login() {
  if (document.getElementById("pass").value === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    listeyiGetir();
  } else {
    alert("Hatalı şifre!");
  }
}

async function gonder() {
  const oda = document.getElementById("oda").value;
  const ariza = document.getElementById("ariza").value;

  await fetch(SUPABASE_URL + "/rest/v1/arizalar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ oda, ariza, durum: "bekliyor" })
  });

  document.getElementById("oda").value = "";
  document.getElementById("ariza").value = "";

  listeyiGetir();
}

async function listeyiGetir() {
  const filtre = document.getElementById("filtre").value;

  let url = SUPABASE_URL + "/rest/v1/arizalar?select=*&order=id.desc";

  if (filtre !== "hepsi") {
    url += "&durum=eq." + filtre;
  }

  const res = await fetch(url, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");

    li.innerHTML = `
      <b>Oda ${item.oda}</b><br>
      ${item.ariza}<br>
      <span class="${item.durum}">[${item.durum}]</span><br>
      <button onclick="tamamla(${item.id})">Tamamlandı</button>
    `;

    liste.appendChild(li);
  });
}

async function tamamla(id) {
  await fetch(SUPABASE_URL + "/rest/v1/arizalar?id=eq." + id, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ durum: "tamamlandı" })
  });

  listeyiGetir();
}

</script>

</body>
</html>
